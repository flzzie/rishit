<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uh Oh</title>
  <link rel="icon" type="image/png" href="https://cdn3.emoji.gg/emojis/7017-panda-exicted.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 404 content behind the glass ── */
    .content {
      position: fixed; inset: 0; z-index: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .9rem; text-align: center;
      pointer-events: none;
      padding: 1rem;
    }

    .err-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(110, 70, 190, .7);
    }

    .err-num {
      font-size: clamp(5.5rem, 20vw, 13rem);
      font-weight: 800; line-height: 1;
      letter-spacing: -.05em;
      color: #eef2ff;
    }

    .err-msg {
      font-size: clamp(.95rem, 2.5vw, 1.25rem);
      color: rgba(139, 156, 196, .85);
      letter-spacing: -.01em;
    }

    .home-link {
      margin-top: .4rem;
      display: inline-flex; align-items: center; gap: .4rem;
      color: #3692e7; text-decoration: none;
      font-size: .88rem; font-weight: 600;
      opacity: 0; transition: opacity .6s ease;
      pointer-events: none;
      border: 1px solid rgba(54,146,231,.3);
      border-radius: 8px; padding: .42rem 1rem;
    }
    .home-link.show { opacity: 1; pointer-events: all; }
    .home-link:hover { background: rgba(54,146,231,.1); }

    /* ── Glass canvas ── */
    #glass {
      position: fixed; inset: 0; z-index: 5;
      cursor: crosshair;
    }

    /* ── Hint ── */
    .hint {
      position: fixed; bottom: 2.2rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: .65rem; letter-spacing: .12em; color: rgba(255,255,255,.22);
      z-index: 10; pointer-events: none;
      transition: opacity .5s;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: .45; } 50% { opacity: 1; }
    }
    .hint.gone { opacity: 0 !important; animation: none; }
  </style>
</head>
<body>

  <div class="content">
    <span class="err-label">Error</span>
    <div class="err-num">404</div>
    <p class="err-msg">Looks like you're lost.</p>
    <a class="home-link" href="/" id="homeLink">← Back to home</a>
  </div>

  <span class="hint" id="hint">click anywhere to shatter</span>

  <canvas id="glass"></canvas>

<script>
const canvas  = document.getElementById("glass");
const ctx     = canvas.getContext("2d");
const hint    = document.getElementById("hint");
const homeLink = document.getElementById("homeLink");

let W, H, shards = [], cracks = [], totalShards = 0, brokenCount = 0;
let audioCtx = null, hintGone = false;

// ── Resize & build ───────────────────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  shards = []; cracks = []; brokenCount = 0;
  buildGlass();
}

function buildGlass() {
  const COLS = Math.ceil(W / 68) + 2;
  const ROWS = Math.ceil(H / 68) + 2;
  const CW = W / (COLS - 2);
  const CH = H / (ROWS - 2);

  const pts = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const edge = r === 0 || r === ROWS-1 || c === 0 || c === COLS-1;
      pts.push({
        x: (c - 1) * CW + (edge ? 0 : (Math.random()-.5) * CW * .65),
        y: (r - 1) * CH + (edge ? 0 : (Math.random()-.5) * CH * .65),
      });
    }
  }

  for (let r = 0; r < ROWS-1; r++) {
    for (let c = 0; c < COLS-1; c++) {
      const tl = pts[ r    * COLS + c    ];
      const tr = pts[ r    * COLS + c + 1];
      const bl = pts[(r+1) * COLS + c    ];
      const br = pts[(r+1) * COLS + c + 1];
      if (Math.random() > .5) {
        shards.push(makeShard([tl, tr, bl]));
        shards.push(makeShard([tr, br, bl]));
      } else {
        shards.push(makeShard([tl, tr, br]));
        shards.push(makeShard([tl, br, bl]));
      }
    }
  }
  totalShards = shards.length;
}

function centroid(pts) {
  return { x: pts.reduce((s,p)=>s+p.x,0)/pts.length, y: pts.reduce((s,p)=>s+p.y,0)/pts.length };
}

function makeShard(pts) {
  const { x: cx, y: cy } = centroid(pts);
  return {
    pts, cx, cy,
    broken: false,
    dx: 0, dy: 0, vx: 0, vy: 0, angle: 0, va: 0, alpha: 1,
    glint: .03 + Math.random() * .05,
  };
}

// ── Crack lines ───────────────────────────────────────────────────────────────
function addCrack(ox, oy) {
  const n = 8 + Math.floor(Math.random() * 6);
  const lines = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + (Math.random() - .5) * .4;
    const len = Math.hypot(W, H);
    lines.push({ x1: ox, y1: oy, x2: ox + Math.cos(a)*len, y2: oy + Math.sin(a)*len });
  }
  cracks.push({ ox, oy, lines });
}

// ── Shatter nearby ────────────────────────────────────────────────────────────
function shatterNear(ox, oy) {
  const R = Math.max(W, H) * .17;
  shards.forEach(s => {
    if (s.broken) return;
    const dist = Math.hypot(s.cx - ox, s.cy - oy);
    if (dist > R) return;
    s.broken = true;
    brokenCount++;
    const t = 1 - dist / R;
    const spd = t * 14 + 2 + Math.random() * 5;
    const a = Math.atan2(s.cy - oy, s.cx - ox) + (Math.random()-.5) * .9;
    s.vx = Math.cos(a) * spd;
    s.vy = Math.sin(a) * spd - 3;
    s.va = (Math.random()-.5) * .18;
  });
}

// ── Sound ─────────────────────────────────────────────────────────────────────
function playGlass() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const t = audioCtx.currentTime;

    // White noise burst
    const dur = .4, rate = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(2, rate * dur, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < d.length; i++)
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.8);
    }
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const hp = audioCtx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1800;
    const gn = audioCtx.createGain();
    gn.gain.setValueAtTime(.55, t); gn.gain.exponentialRampToValueAtTime(.001, t + dur);
    src.connect(hp); hp.connect(gn); gn.connect(audioCtx.destination); src.start(); src.stop(t+dur);

    // Tinkle partials
    [1600, 2200, 3000, 4400, 5800].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const og  = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq + Math.random()*400, t);
      osc.frequency.exponentialRampToValueAtTime(freq*.35, t+.22);
      og.gain.setValueAtTime(.07 - i*.008, t);
      og.gain.exponentialRampToValueAtTime(.001, t+.28+i*.04);
      osc.connect(og); og.connect(audioCtx.destination);
      osc.start(t); osc.stop(t+.35+i*.04);
    });
  } catch(e) {}
}

// ── Draw loop ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Crack lines
  ctx.save();
  cracks.forEach(c => {
    c.lines.forEach(l => {
      ctx.beginPath(); ctx.moveTo(l.x1, l.y1); ctx.lineTo(l.x2, l.y2);
      ctx.strokeStyle = "rgba(210,230,255,.5)";
      ctx.lineWidth = .8;
      ctx.shadowColor = "rgba(160,200,255,.7)"; ctx.shadowBlur = 3;
      ctx.stroke();
    });
    // Impact dot
    ctx.beginPath(); ctx.arc(c.ox, c.oy, 3.5, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255,255,255,.9)"; ctx.lineWidth = 1.5; ctx.shadowBlur = 10;
    ctx.stroke();
  });
  ctx.restore();

  // Shards
  shards.forEach(s => {
    if (s.broken && s.alpha <= 0.01) return;
    ctx.save();

    if (s.broken) {
      s.vy += .45;            // gravity
      s.dx += s.vx; s.dy += s.vy;
      s.angle += s.va;
      s.alpha  = Math.max(0, s.alpha - .018);

      ctx.translate(s.cx + s.dx, s.cy + s.dy);
      ctx.rotate(s.angle);
      ctx.globalAlpha = s.alpha;

      const lp = s.pts.map(p => ({ x: p.x - s.cx, y: p.y - s.cy }));
      ctx.beginPath(); ctx.moveTo(lp[0].x,lp[0].y); ctx.lineTo(lp[1].x,lp[1].y); ctx.lineTo(lp[2].x,lp[2].y); ctx.closePath();
      ctx.fillStyle = `rgba(170,210,255,${s.glint * .6})`;
      ctx.fill();
      ctx.strokeStyle = `rgba(200,228,255,${.45 * s.alpha})`;
      ctx.lineWidth = .65; ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(s.pts[0].x, s.pts[0].y);
      ctx.lineTo(s.pts[1].x, s.pts[1].y);
      ctx.lineTo(s.pts[2].x, s.pts[2].y);
      ctx.closePath();
      ctx.fillStyle = `rgba(170,210,255,${s.glint})`;
      ctx.fill();
      ctx.strokeStyle = "rgba(190,220,255,.32)";
      ctx.lineWidth = .7; ctx.stroke();
    }
    ctx.restore();
  });

  // Reveal home link at 60%
  if (brokenCount / totalShards > .6) homeLink.classList.add("show");
  // Disable canvas overlay at 85% so link is clickable
  if (brokenCount / totalShards > .85) canvas.style.pointerEvents = "none";

  requestAnimationFrame(draw);
}

// ── Click ─────────────────────────────────────────────────────────────────────
canvas.addEventListener("click", e => {
  if (!hintGone) { hintGone = true; hint.classList.add("gone"); }

  playGlass();
  addCrack(e.clientX, e.clientY);
  shatterNear(e.clientX, e.clientY);

  // Brief white flash
  ctx.save();
  ctx.globalAlpha = .18;
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
});

// ── Touch support ─────────────────────────────────────────────────────────────
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => {
    if (!hintGone) { hintGone = true; hint.classList.add("gone"); }
    playGlass();
    addCrack(t.clientX, t.clientY);
    shatterNear(t.clientX, t.clientY);
  });
}, { passive: false });

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener("resize", resize);
resize();
draw();
</script>
</body>
</html>
