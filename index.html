<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rishit's Portfolio</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/661/661764.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gif-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .gif-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-text {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(2.2rem, 6.5vw, 5.5rem);
      white-space: nowrap;
      color: #ffffff;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 15px rgba(255, 0, 120, 0.9),
        0 0 35px rgba(255, 0, 120, 0.7),
        0 0 70px rgba(255, 0, 120, 0.5),
        2px 2px 0 #880033,
        -2px -2px 0 #880033,
        2px -2px 0 #880033,
        -2px 2px 0 #880033;
      animation: pulse 1.8s ease-in-out infinite alternate;
      pointer-events: none;
      user-select: none;
    }

    @keyframes pulse {
      from {
        text-shadow:
          0 0 15px rgba(255, 0, 120, 0.9),
          0 0 35px rgba(255, 0, 120, 0.7),
          0 0 70px rgba(255, 0, 120, 0.5),
          2px 2px 0 #880033,
          -2px -2px 0 #880033,
          2px -2px 0 #880033,
          -2px 2px 0 #880033;
        color: #ffffff;
      }
      to {
        text-shadow:
          0 0 20px rgba(0, 230, 255, 0.95),
          0 0 50px rgba(0, 230, 255, 0.75),
          0 0 100px rgba(0, 230, 255, 0.5),
          2px 2px 0 #004455,
          -2px -2px 0 #004455,
          2px -2px 0 #004455,
          -2px 2px 0 #004455;
        color: #e0faff;
      }
    }
  </style>
</head>
<body>
  <div class="gif-container">
    <img
      class="gif-bg"
      src="https://preview.redd.it/the-first-rickroll-occurred-19-years-after-the-songs-v0-i8ijkqb0v2cf1.gif?width=498&auto=webp&s=e36e0c4f6cfa8ec104f91ec0a4f80823c04ed36b"
      alt="rickroll"
    />
    <div class="overlay-text">you got rickrolled :)</div>
  </div>
</body>
</html>
